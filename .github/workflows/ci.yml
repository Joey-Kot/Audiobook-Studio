name: CI/CD

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latest-release-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Test core
        run: go test ./...

      - name: Check FFmpeg nonfree is disabled
        run: |
          if grep -R -n -- '--enable-nonfree' scripts; then
            echo "FFmpeg nonfree components must not be enabled." >&2
            exit 1
          fi

      - name: Check third-party notices
        run: |
          test -s THIRD_PARTY_NOTICES.txt
          grep -qi 'FFmpeg' THIRD_PARTY_NOTICES.txt
          grep -qi 'libmp3lame\|LAME' THIRD_PARTY_NOTICES.txt

  package:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: core
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            gui_binary: Audiobook-Studio.exe
            archive: Audiobook-Studio-windows-amd64.zip
          - name: darwin-arm64
            os: macos-latest
            platform: darwin/arm64
            gui_binary: Audiobook-Studio.app
            archive: Audiobook-Studio-darwin-arm64.zip
          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
            gui_binary: Audiobook-Studio
            archive: Audiobook-Studio-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            curl \
            git \
            libgtk-3-dev \
            libtool \
            libwebkit2gtk-4.0-dev \
            nasm \
            pkg-config \
            yasm

      - name: Install macOS FFmpeg CGO build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install automake libtool nasm pkg-config yasm

      - name: Install Windows FFmpeg CGO build dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          pacman --noconfirm -S --needed \
            autoconf \
            automake \
            base-devel \
            git \
            libtool \
            make \
            mingw-w64-x86_64-binutils \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-pkgconf \
            nasm \
            yasm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Build frontend
        working-directory: GUI
        run: npm --prefix frontend run build

      - name: Resolve GUI modules
        working-directory: GUI
        run: go mod tidy

      - name: Generate Wails bindings
        working-directory: GUI
        run: wails generate module

      - name: Build FFmpeg CGO dependencies
        if: runner.os != 'Windows'
        run: scripts/build-ffmpeg-static.sh

      - name: Build Windows FFmpeg CGO dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: scripts/build-ffmpeg-windows-amd64.sh

      - name: Build GUI with FFmpeg CGO
        if: runner.os != 'Windows'
        working-directory: GUI
        run: |
          export CGO_ENABLED=1
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH="${GITHUB_WORKSPACE}/build/ffmpeg-$(go env GOOS)-$(go env GOARCH)/lib/pkgconfig"
          export CGO_CFLAGS="$(pkg-config --cflags libavformat libavcodec libswresample libavutil)"
          ffmpeg_ldflags="$(pkg-config --libs --static libavformat libavcodec libswresample libavutil)"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            export CGO_LDFLAGS="${ffmpeg_ldflags}"
          else
            export CGO_LDFLAGS="-Wl,--start-group ${ffmpeg_ldflags} -Wl,--end-group"
          fi
          selected_ffmpeg_files="$(go list -tags gui_ffmpeg_cgo -f '{{.GoFiles}} {{.CgoFiles}}' audiobook-studio/internal/audio/ffmpeg)"
          echo "Selected ffmpeg files: ${selected_ffmpeg_files}"
          case "${selected_ffmpeg_files}" in
            *convert_cgo.go*) ;;
            *) echo "GUI build did not select CGO FFmpeg implementation" >&2; exit 1 ;;
          esac
          case "${selected_ffmpeg_files}" in
            *convert_exec.go*) echo "GUI build selected external-process FFmpeg implementation" >&2; exit 1 ;;
          esac
          wails build -clean -platform ${{ matrix.platform }} -tags gui_ffmpeg_cgo

      - name: Build Windows GUI with FFmpeg CGO
        if: runner.os == 'Windows'
        working-directory: GUI
        shell: msys2 {0}
        run: |
          export CC=x86_64-w64-mingw32-gcc
          export CGO_ENABLED=1
          export PKG_CONFIG_ALLOW_CROSS=1
          workspace="$(cygpath -u "${GITHUB_WORKSPACE}")"
          export PKG_CONFIG_PATH="${workspace}/build/ffmpeg-windows-amd64/lib/pkgconfig"
          export CGO_CFLAGS="$(pkg-config --cflags libavformat libavcodec libswresample libavutil)"
          ffmpeg_ldflags="$(pkg-config --libs --static libavformat libavcodec libswresample libavutil)"
          export CGO_LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,--start-group ${ffmpeg_ldflags} -Wl,--end-group -lwinpthread"
          selected_ffmpeg_files="$(go list -tags gui_ffmpeg_cgo -f '{{.GoFiles}} {{.CgoFiles}}' audiobook-studio/internal/audio/ffmpeg)"
          echo "Selected ffmpeg files: ${selected_ffmpeg_files}"
          case "${selected_ffmpeg_files}" in
            *convert_cgo.go*) ;;
            *) echo "GUI build did not select CGO FFmpeg implementation" >&2; exit 1 ;;
          esac
          case "${selected_ffmpeg_files}" in
            *convert_exec.go*) echo "GUI build selected external-process FFmpeg implementation" >&2; exit 1 ;;
          esac
          wails build -clean -platform ${{ matrix.platform }} -tags gui_ffmpeg_cgo -webview2 download -ldflags='-s -w -extldflags "-static -static-libgcc -static-libstdc++"'

      - name: Check Windows runtime DLL dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          objdump -p GUI/build/bin/Audiobook-Studio.exe | grep 'DLL Name' || true
          if objdump -p GUI/build/bin/Audiobook-Studio.exe | grep -E 'libwinpthread-|libgcc_|libstdc\\+\\+-'; then
            echo "Windows binary still depends on MinGW runtime DLLs." >&2
            exit 1
          fi

      - name: Package zip
        if: runner.os != 'Linux'
        shell: bash
        run: |
          mkdir -p dist/package
          cp -R "GUI/build/bin/${{ matrix.gui_binary }}" dist/package/
          cp README.md LICENSE THIRD_PARTY_NOTICES.txt packaging/RUNNING.md dist/package/
          if [ "${RUNNER_OS}" = "macOS" ]; then
            cp packaging/macos/README-macOS.md dist/package/
          fi
          cd dist/package
          python3 -m zipfile -c "../${{ matrix.archive }}" *

      - name: Package tar
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp "GUI/build/bin/${{ matrix.gui_binary }}" dist/package/
          cp README.md LICENSE THIRD_PARTY_NOTICES.txt packaging/RUNNING.md dist/package/
          cp packaging/linux/check-linux-runtime.sh dist/package/
          chmod +x dist/package/check-linux-runtime.sh
          tar -C dist/package -czf "dist/${{ matrix.archive }}" .

      - name: Checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  publish:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Move Latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f Latest "$GITHUB_SHA"
          git push origin refs/tags/Latest --force

      - name: Publish Latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Automated Audiobook-Studio build from ${GITHUB_REF_NAME} at ${GITHUB_SHA}."
          if gh release view Latest >/dev/null 2>&1; then
            gh release edit Latest --title "Latest" --notes "$notes"
          else
            gh release create Latest --title "Latest" --notes "$notes"
          fi
          gh release upload Latest dist/* --clobber
