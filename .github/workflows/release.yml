name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            gui_binary: Audiobook-Studio.exe
            archive: Audiobook-Studio-windows-amd64.zip
          - name: darwin-arm64
            os: macos-latest
            platform: darwin/arm64
            gui_binary: Audiobook-Studio.app
            archive: Audiobook-Studio-darwin-arm64.zip
          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
            gui_binary: Audiobook-Studio
            archive: Audiobook-Studio-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            curl \
            git \
            libgtk-3-dev \
            libtool \
            libwebkit2gtk-4.0-dev \
            nasm \
            pkg-config \
            yasm

      - name: Install macOS FFmpeg CGO build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install automake libtool nasm pkg-config yasm

      - name: Install Windows FFmpeg CGO build dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          pacman --noconfirm -S --needed \
            autoconf \
            automake \
            base-devel \
            git \
            libtool \
            make \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-pkgconf \
            nasm \
            yasm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Test core
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          go test ./...

      - name: Build frontend
        working-directory: GUI
        run: npm --prefix frontend run build

      - name: Resolve GUI modules
        working-directory: GUI
        run: go mod tidy

      - name: Generate Wails bindings
        working-directory: GUI
        run: wails generate module

      - name: Build FFmpeg CGO dependencies
        if: runner.os != 'Windows'
        run: scripts/build-ffmpeg-static.sh

      - name: Build Windows FFmpeg CGO dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: scripts/build-ffmpeg-windows-amd64.sh

      - name: Build GUI with FFmpeg CGO
        if: runner.os != 'Windows'
        working-directory: GUI
        run: |
          export CGO_ENABLED=1
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH="${GITHUB_WORKSPACE}/build/ffmpeg-$(go env GOOS)-$(go env GOARCH)/lib/pkgconfig"
          export CGO_CFLAGS="$(pkg-config --cflags libavformat libavcodec libswresample libavutil)"
          ffmpeg_ldflags="$(pkg-config --libs --static libavformat libavcodec libswresample libavutil)"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            export CGO_LDFLAGS="${ffmpeg_ldflags}"
          else
            export CGO_LDFLAGS="-Wl,--start-group ${ffmpeg_ldflags} -Wl,--end-group"
          fi
          selected_ffmpeg_files="$(go list -tags gui_ffmpeg_cgo -f '{{.GoFiles}} {{.CgoFiles}}' audiobook-studio/internal/audio/ffmpeg)"
          echo "Selected ffmpeg files: ${selected_ffmpeg_files}"
          case "${selected_ffmpeg_files}" in
            *convert_cgo.go*) ;;
            *) echo "GUI build did not select CGO FFmpeg implementation" >&2; exit 1 ;;
          esac
          case "${selected_ffmpeg_files}" in
            *convert_exec.go*) echo "GUI build selected external-process FFmpeg implementation" >&2; exit 1 ;;
          esac
          wails build -clean -platform ${{ matrix.platform }} -tags gui_ffmpeg_cgo

      - name: Build Windows GUI with FFmpeg CGO
        if: runner.os == 'Windows'
        working-directory: GUI
        shell: msys2 {0}
        run: |
          export CC=x86_64-w64-mingw32-gcc
          export CGO_ENABLED=1
          export PKG_CONFIG_ALLOW_CROSS=1
          workspace="$(cygpath -u "${GITHUB_WORKSPACE}")"
          export PKG_CONFIG_PATH="${workspace}/build/ffmpeg-windows-amd64/lib/pkgconfig"
          export CGO_CFLAGS="$(pkg-config --cflags libavformat libavcodec libswresample libavutil)"
          ffmpeg_ldflags="$(pkg-config --libs --static libavformat libavcodec libswresample libavutil)"
          export CGO_LDFLAGS="-Wl,--start-group ${ffmpeg_ldflags} -Wl,--end-group"
          selected_ffmpeg_files="$(go list -tags gui_ffmpeg_cgo -f '{{.GoFiles}} {{.CgoFiles}}' audiobook-studio/internal/audio/ffmpeg)"
          echo "Selected ffmpeg files: ${selected_ffmpeg_files}"
          case "${selected_ffmpeg_files}" in
            *convert_cgo.go*) ;;
            *) echo "GUI build did not select CGO FFmpeg implementation" >&2; exit 1 ;;
          esac
          case "${selected_ffmpeg_files}" in
            *convert_exec.go*) echo "GUI build selected external-process FFmpeg implementation" >&2; exit 1 ;;
          esac
          wails build -clean -platform ${{ matrix.platform }} -tags gui_ffmpeg_cgo

      - name: Package zip
        if: runner.os != 'Linux'
        shell: bash
        run: |
          mkdir -p dist/package
          cp -R "GUI/build/bin/${{ matrix.gui_binary }}" dist/package/
          cp README.md LICENSE dist/package/
          cd dist/package
          python3 -m zipfile -c "../${{ matrix.archive }}" *

      - name: Package tar
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp "GUI/build/bin/${{ matrix.gui_binary }}" dist/package/
          cp README.md LICENSE dist/package/
          tar -C dist/package -czf "dist/${{ matrix.archive }}" .

      - name: Checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated Audiobook-Studio build for ${GITHUB_REF_NAME}."
