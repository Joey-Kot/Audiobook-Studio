name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            gui_binary: Audiobook-Studio.exe
            archive: Audiobook-Studio-windows-amd64.zip
          - name: darwin-arm64
            os: macos-latest
            platform: darwin/arm64
            gui_binary: Audiobook-Studio.app
            archive: Audiobook-Studio-darwin-arm64.zip
          - name: linux-amd64
            os: ubuntu-latest
            platform: linux/amd64
            gui_binary: Audiobook-Studio
            archive: Audiobook-Studio-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev || \
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Test core
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          go test ./...

      - name: Build frontend
        working-directory: GUI
        run: npm --prefix frontend run build

      - name: Resolve GUI modules
        working-directory: GUI
        run: go mod tidy

      - name: Generate Wails bindings
        working-directory: GUI
        run: wails generate module

      - name: Build GUI
        working-directory: GUI
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Package zip
        if: runner.os != 'Linux'
        shell: bash
        run: |
          mkdir -p dist/package
          cp -R "GUI/build/bin/${{ matrix.gui_binary }}" dist/package/
          cp README.md LICENSE dist/package/
          cd dist/package
          python3 -m zipfile -c "../${{ matrix.archive }}" *

      - name: Package tar
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp "GUI/build/bin/${{ matrix.gui_binary }}" dist/package/
          cp README.md LICENSE dist/package/
          tar -C dist/package -czf "dist/${{ matrix.archive }}" .

      - name: Checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated Audiobook-Studio build for ${GITHUB_REF_NAME}."
